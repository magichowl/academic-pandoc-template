cite-method: citeproc # citeproc, natbib, or biblatex
embed-resources: true
file-scope: false # Parse each file individually before combining for multifile documents. This will allow footnotes in different files with working footnotes and links across files if disabled.
from: markdown
highlight-style: pygments
reference-location: block # block, section, or document
resource-path: []
standalone: true
top-level-division: default # part, chapter, section, or default
verbosity: INFO # ERROR, WARNING, or INFO
